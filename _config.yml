title: Ben Luxon
tagline: Author
description: Science fiction and fantasy stories blending technology, philosophy, and world-building.
url: "https://benluxonauthor.com"
baseurl: ""

author:
  name: Ben Luxon
  amazon: "https://www.amazon.com/Sunset-East-Sci-Fi-Short-Stories-ebook/dp/B09QPHL21X"

sister_site:
  name: Cabbage Tree Books
  url: "https://cabbagetreebooks.com"
  description: "Book recommendations, reviews & genre guides"

mailerlite:
  form_url: "YOUR_MAILERLITE_FORM_URL_HERE"

markdown: kramdown
highlighter: rouge
permalink: /blog/:slug/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      category: "Writers Blog"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
